defaults:
  - _self_
  - estimator: fdime_kl
  - data: high_mi

seed: 42
output_path: mi_statistics/${estimator.config.estimator}/mi=${mutual_information}/seq_length=${data.config.seq_length}/seed=${seed}/${now:%Y%m%d_%H%M%S_%f}.yaml
alphabet_size: 4
mutual_information: 10
seq_length: ${mutual_information}
init_dim: 80
sigma_dim: 40
resnet_block_groups: 8

trainer:
  _target_: pytorch_lightning.Trainer
  max_steps: 100001
  val_check_interval: 1000
  check_val_every_n_epoch: null
  limit_val_batches: 1.0
  devices: [0]
  accelerator: 'gpu'
  logger: true
  enable_progress_bar: true
  fast_dev_run: False
  callbacks:
    - _target_: pytorch_lightning.callbacks.ModelCheckpoint
      dirpath: checkpoints/${estimator.config.estimator}/mi=${mutual_information}/seq_length=${data.config.seq_length}/${now:%Y%m%d_%H%M%S_%f}
      filename: epoch_{epoch:02d}
      every_n_epochs: 1
      save_top_k: -1  # Save all checkpoints
      save_last: true

logger:
  _target_: pytorch_lightning.loggers.WandbLogger
  project: infosedd
  name: run_${now:%Y%m%d_%H%M%S_%f}
  group: null
  job_type: null
  id: null